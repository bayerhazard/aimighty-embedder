# Aimighty Embedder - Standalone Kubernetes Deployment
# Target: Olares cluster with Intel Arrow Lake-S iGPU
# Image: ghcr.io/bayerhazard/aimighty-embedder:latest
#
# Prerequisites:
#   - Intel GPU Device Plugin installed (gpu.intel.com/i915)
#   - SR-IOV disabled on host (sriov_numvfs=0)
#   - Node labeled with kubernetes.io/hostname=olares
#
# GPU Config:
#   - Device: GPU (OpenVINO)
#   - Performance Hint: THROUGHPUT
#   - Streams: 2
#   - Precision: FP16
#   - Large Allocations: YES
#   - Drivers: Intel OpenCL 24.39.x (pinned, avoids IGC 25.18.x crash)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedder-dev
  namespace: embedder-dev-aimighty
  labels:
    app.kubernetes.io/managed-by: Helm
    applications.app.bytetrade.io/name: embedder-dev
    applications.app.bytetrade.io/owner: aimighty
    io.kompose.service: embedder
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      io.kompose.service: embedder
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        applications.app.bytetrade.io/name: embedder-dev
        applications.app.bytetrade.io/owner: aimighty
        applications.app.bytetrade.io/raw-app-name: embedder-dev
        io.bytetrade.app: "true"
        io.kompose.service: embedder
      annotations:
        applications.app.bytetrade.io/studio-expose-ports: ""
    spec:
      nodeSelector:
        kubernetes.io/hostname: olares
      imagePullSecrets:
        - name: ghcr-secret
      securityContext:
        supplementalGroups:
          - 44    # video group (card devices)
          - 994   # render group (renderD devices)
      containers:
        - name: embedder
          image: ghcr.io/bayerhazard/aimighty-embedder:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9997
              protocol: TCP
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Etc/UTC
            - name: PORT
              value: "9997"
            - name: MODEL_NAME
              value: aimighty-embedding-4b
            - name: HF_MODEL_ID
              value: Qwen/Qwen3-Embedding-4B
            - name: HUGGING_FACE_HUB_TOKEN
              value: ""  # Set via secret or env
            - name: MODEL_CACHE_DIR
              value: /models_cache
            - name: OV_CACHE_DIR
              value: /tmp/ov_cache
            - name: OV_DEVICE
              value: GPU
            - name: PERFORMANCE_HINT
              value: THROUGHPUT
            - name: NUM_STREAMS
              value: "2"
            - name: INFERENCE_PRECISION_HINT
              value: f16
            - name: GPU_ENABLE_LARGE_ALLOCATIONS
              value: "YES"
          resources:
            requests:
              cpu: "2"
              memory: 16Gi
              gpu.intel.com/i915: "1"
            limits:
              cpu: "4"
              memory: 24Gi
              gpu.intel.com/i915: "1"
          volumeMounts:
            - name: model-cache
              mountPath: /models_cache
            - name: dri-devices
              mountPath: /dev/dri
          livenessProbe:
            httpGet:
              path: /health
              port: 9997
              scheme: HTTP
            initialDelaySeconds: 180
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 9997
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 12
            timeoutSeconds: 5
      volumes:
        - name: model-cache
          hostPath:
            path: /olares/userdata/Cache/pvc-appcache-aimighty-cwximf94nlprzimu/embedder-dev/embedder/aimighty-embedder-models
            type: DirectoryOrCreate
        - name: dri-devices
          hostPath:
            path: /dev/dri
            type: Directory
