---
olaresManifest.version: '0.10.0'
olaresManifest.type: app
apiVersion: 'v2'
metadata:
  name: aimembqwen3vino
  icon: https://raw.githubusercontent.com/bayerhazard/aimighty-embedder/main/icon.png
  description: Qwen3-Embedding-4B INT8 via OpenVINO
  appid: aimembqwen3vino
  title: AIM Qwen3 Emb 4B OpenVINO
  version: '1.1.7'
  categories:
    - AI
entrances:
  - name: aimembqwen3vino
    port: 9997
    host: aimembqwen3vino
    title: AIM Qwen3 Emb 4B OpenVINO
    icon: https://raw.githubusercontent.com/bayerhazard/aimighty-embedder/main/icon.png
    openMethod: window
    authLevel: internal
spec:
  versionName: '1.1.7'
  upgradeDescription: |
    v1.1.7: Fixed YAML indentation in deployment.yaml (volumes section). Bumped version to force Olares re-fetch.
    v1.1.6: Bumped all versions to 1.1.6 for Olares consistency. Added hostPath persistence for /models_cache to prevent 4GB model re-download on every restart. Fixed Olares Store appData path.
    v1.1.4: Added nginx dashboard container with HTML monitoring UI. Service now exposes port 8080 for dashboard access. Set livenessProbe initialDelay to 1200s for reliable startup.
    v1.1.3: Fixed OlaresManifest structure to match Olares spec v0.10.0. Moved resource fields to spec section. Fixed manifest version compatibility.
    v1.1.1: Fixed missing icon in installed apps. Added icon URL to entrances and switched to raw.githubusercontent.com CDN.
    v1.1.0: Fixed TZ env type (int → string), reduced livenessProbe initialDelay from 30min to 5min, added resource limits to initContainer, cleaned up Dockerfile dependencies.
    v1.0.4: Added openMethod: window to entrance config so dashboard opens in browser tab on click.
    v1.0.2: Fixed Envoy upstream timeout. Replaced broken initContainer with kubectl-based ConfigMap patching (15s → 3600s). Added RBAC for ConfigMap access.
    v1.0.1: Removed init-patcher relict, hostPath /dev/dri instead of GPU device plugin.
  fullDescription: |
    Qwen3-Embedding-4B + OpenVINO on CPU, optimized for Olares One.

    **Model**
    Qwen/Qwen3-Embedding-4B — a 4-billion-parameter embedding model from Qwen, INT8 quantized via Optimum Intel for efficient inference on consumer hardware.

    **Inference Engine**
    OpenVINO 2026.0.0+ with Hugging Face Transformers 4.55.4. Runs on Intel Core Ultra iGPU (Arrow Lake-S) with automatic CPU fallback if the GPU is unavailable.

    **Key Features**
    - OpenAI-compatible API endpoints: /v1/embeddings, /v1/models, /health
    - THROUGHPUT mode with 2 parallel streams, FP16 precision, and large memory allocations for high throughput
    - Async endpoints with race-condition protection for concurrent RAG workloads
    - Automatic model download and OpenVINO conversion on first start
    - Cluster mode (2 pods across nodes) or single-node mode selectable at install time
    - Built-in HTML dashboard on root endpoint (/)

    **Resource Usage**
    Single mode: ~24 GB RAM, 2 CPU cores
    Cluster mode: ~48 GB RAM, 4 CPU cores (2 nodes)
    Disk: 50 GB for model cache

  developer: Aimighty
  website: https://github.com/bayerhazard/aimighty-embedder
  sourceCode: https://github.com/bayerhazard/aimighty-embedder
  locale:
    - en-US
  supportArch:
    - amd64
  limitedCpu: 4
  requiredCpu: 2
  requiredMemory: 24Gi
  limitedMemory: 24Gi
  requiredDisk: 50Gi
permission:
  appData: true
options:
  apiTimeout: 3600
  dependencies:
    - name: olares
      version: '>=1.12.2-0'
      type: system
  allowMultipleInstall: false
