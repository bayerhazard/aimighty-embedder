apiVersion: apps/v1
kind: Deployment
metadata:
  name: aimembqwen3vino
  namespace: {{ .Release.Namespace }}
  labels:
    app: aimembqwen3vino
    applications.app.bytetrade.io/name: aimembqwen3vino
    applications.app.bytetrade.io/owner: {{ .Release.Namespace | trimSuffix "-aimighty" }}
    io.kompose.service: aimembqwen3vino
spec:
  replicas: {{ if or (eq (.Values.olaresEnv.EMBEDDER_MODE | default "cluster") "cluster") (eq .Values.olaresEnv.EMBEDDER_MODE "Cluster_Mode") }}2{{ else }}1{{ end }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      app: aimembqwen3vino
  strategy:
    type: {{ .Values.strategy.type }}
    {{- if .Values.strategy.rollingUpdate }}
    rollingUpdate:
      maxSurge: {{ .Values.strategy.rollingUpdate.maxSurge }}
      maxUnavailable: {{ .Values.strategy.rollingUpdate.maxUnavailable }}
    {{- end }}
  template:
    metadata:
      labels:
        app: aimembqwen3vino
        applications.app.bytetrade.io/name: aimembqwen3vino
        applications.app.bytetrade.io/owner: {{ .Release.Namespace | trimSuffix "-aimighty" }}
        io.bytetrade.app: "true"
        io.kompose.service: aimembqwen3vino
    spec:
      {{- if or (eq (.Values.olaresEnv.EMBEDDER_MODE | default "cluster") "cluster") (eq .Values.olaresEnv.EMBEDDER_MODE "Cluster_Mode") }}
      # cluster mode: spread pods across both nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: aimembqwen3vino
                topologyKey: kubernetes.io/hostname
      {{- else }}
      # single mode: run on any node
      {{- end }}
      containers:
        - name: embedder
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext: {}
          ports:
            - containerPort: {{ .Values.containerPort }}
              protocol: TCP
          env:
            {{- range $key, $value := .Values.env }}
            {{- if ne $value "" }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
            {{- range $key, $value := .Values.olaresEnv }}
            {{- if ne $value "" }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: app-envoy-config
              mountPath: /etc/envoy-config
              readOnly: true
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
      volumes:
        - name: app-envoy-config
          emptyDir: {}
