apiVersion: apps/v1
kind: Deployment
metadata:
  name: aimembqwen3vino
  namespace: {{ .Release.Namespace }}
  labels:
    app: aimembqwen3vino
    applications.app.bytetrade.io/name: aimembqwen3vino
    applications.app.bytetrade.io/owner: {{ .Release.Namespace | trimSuffix "-aimighty" }}
    io.kompose.service: aimembqwen3vino
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      app: aimembqwen3vino
  strategy:
    type: {{ .Values.strategy.type }}
  template:
    metadata:
      labels:
        app: aimembqwen3vino
        applications.app.bytetrade.io/name: aimembqwen3vino
        applications.app.bytetrade.io/owner: {{ .Release.Namespace | trimSuffix "-aimighty" }}
        io.bytetrade.app: "true"
        io.kompose.service: aimembqwen3vino
    spec:
      initContainers:
        - name: patch-envoy-timeout
          image: beclab/busybox:1.28
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              echo "[PATCH] Waiting for envoy config files..."
              for i in $(seq 1 30); do
                if [ -f /config/envoy.yaml ] && [ -f /config/envoy2.yaml ]; then
                  echo "[PATCH] Found config files, patching timeouts..."
                  sed -i 's/timeout: 15s/timeout: 120s/g' /config/envoy.yaml /config/envoy2.yaml
                  sed -i 's/timeout: 2s/timeout: 120s/g' /config/envoy.yaml /config/envoy2.yaml
                  echo "[PATCH] Done. Verifying..."
                  grep 'timeout:' /config/envoy.yaml /config/envoy2.yaml || true
                  exit 0
                fi
                echo "[PATCH] Waiting for config files... ($i/30)"
                sleep 1
              done
              echo "[PATCH] WARNING: Config files not found, continuing anyway..."
          volumeMounts:
            - name: app-envoy-config
              mountPath: /config
          resources:
            limits:
              cpu: 100m
              memory: 32Mi
            requests:
              cpu: 10m
              memory: 16Mi
      containers:
        - name: embedder
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext: {}
          ports:
            - containerPort: {{ .Values.containerPort }}
              protocol: TCP
          env:
            - name: EMBEDDER_MODE
              value: {{ .Values.olaresEnv.EMBEDDER_MODE | default "single" | quote }}
            {{- range $key, $value := .Values.env }}
            {{- if ne $value "" }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
            {{- range $key, $value := .Values.olaresEnv }}
            {{- if ne $key "EMBEDDER_MODE" }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: app-envoy-config
              mountPath: /etc/envoy-config
              readOnly: true
            - name: models-cache
              mountPath: /models_cache
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
      volumes:
        - name: app-envoy-config
          emptyDir: {}
        - name: models-cache
          hostPath:
            path: "{{ .Values.userspace.appData }}/aimembqwen3vino/models_cache"
            type: DirectoryOrCreate
