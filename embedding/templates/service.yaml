apiVersion: v1
kind: Service
metadata:
  name: embedding
  namespace: {{ .Release.Namespace }}
  labels:
    app: embedding
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: http
  selector:
    app: embedding
