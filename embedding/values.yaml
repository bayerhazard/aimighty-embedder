image:
  repository: ghcr.io/bayerhazard/aimighty-embedder
  tag: igpu-v12
  pullPolicy: Always
replicaCount: 1
revisionHistoryLimit: 1
containerPort: 9997
strategy:
  type: RollingUpdate
resources:
  limits:
    cpu: '8'
    memory: 24Gi
  requests:
    cpu: '2'
    memory: 8Gi
env:
  TZ: Etc/UTC
  MODEL_NAME: aimighty-embedding-4b
  HF_MODEL_ID: Qwen/Qwen3-Embedding-4B
  PORT: '9997'
  MODEL_CACHE_DIR: /models_cache
  OV_CACHE_DIR: /tmp/ov_cache

# Olares-configurable environment variables (shown in App Settings UI)
olaresEnv:
  EMBEDDER_MODE: "single"
  OV_DEVICE: CPU
  PERFORMANCE_HINT: THROUGHPUT
  NUM_STREAMS: '2'
securityContext: {}
livenessProbe:
  httpGet:
    path: /health
    port: 9997
    scheme: HTTP
  initialDelaySeconds: 300
  periodSeconds: 60
  failureThreshold: 30
  timeoutSeconds: 5
readinessProbe:
  httpGet:
    path: /health
    port: 9997
    scheme: HTTP
  initialDelaySeconds: 60
  periodSeconds: 30
  failureThreshold: 30
  timeoutSeconds: 5
startupProbe:
  httpGet:
    path: /health
    port: 9997
    scheme: HTTP
  initialDelaySeconds: 30
  periodSeconds: 15
  failureThreshold: 30
  timeoutSeconds: 5
service:
  type: ClusterIP
  port: 9997

# Olares-specific environment variables (overridden by Olares at install time)
olaresEnv:
  EMBEDDER_MODE: "single"

# Userspace paths (overridden by Olares at install time)
userspace:
  appData: "/olares/rootfs/userspace/pvc-userspace-aimighty-phbiddku99qy4cuz"
