---
olaresManifest.version: '0.10.0'
olaresManifest.type: app
apiVersion: 'v2'
metadata:
  name: aimembqwen3vino
  icon: https://raw.githubusercontent.com/bayerhazard/aimighty-embedder/main/icon.png
  description: Qwen3-Embedding-4B INT8 via OpenVINO
  appid: aimembqwen3vino
  title: AIM Qwen3 Emb 4B
  version: '1.2.8'
  categories:
    - AI
entrances:
  - name: aimembqwen3vino
    port: 9997
    host: aimembqwen3vino
    title: Embedder
    icon: https://raw.githubusercontent.com/bayerhazard/aimighty-embedder/main/icon.png
    openMethod: window
    authLevel: internal
spec:
  versionName: "1.2.8"
  upgradeDescription: |
    v1.2.8: Fixed env vars in chart OlaresManifest — now editable with dropdowns. Added MODEL_NAME.
    v1.2.7: Made env vars editable in Olares UI. Added MODEL_NAME env. Renamed GPU option to iGPU.
    v1.2.6: Updated app title to "AIM Qwen3 Emb 4B" and entrance label to "Embedder".
    v1.2.5: Version bump to 1.2.5.
    v1.2.0: Bumped to stable production version. All features tested and verified. Clean version number.
    v1.1.10: REMOVED broken hostPath for /models_cache — it was hiding the pre-baked OpenVINO model in the Docker image. Now using image-internal model only. — Reverted to clean working 1.1.3 structure. Removed nginx dashboard container and inline ConfigMap (embedder serves HTML natively on port 9997). Removed broken YAML indentation fixes. Fixed replicas template (no single-quotes). Removed dashboardPort. Kept models_cache hostPath persistence.
    v1.1.8: Fixed startupProbe indentation (9→10 spaces) which caused YAML parse error. Single-quoted replicas template for safe YAML parsing.
    v1.1.7: Fixed YAML indentation in deployment.yaml (volumes section). Bumped version to force Olares re-fetch.
    v1.1.6: Bumped all versions to 1.1.6 for Olares consistency. Added hostPath persistence for /models_cache to prevent 4GB model re-download on every restart. Fixed Olares Store appData path.
    v1.1.3: Fixed OlaresManifest structure to match Olares spec v0.10.0. Moved resource fields to spec section. Fixed manifest version compatibility.
    v1.1.1: Fixed missing icon in installed apps. Added icon URL to entrances and switched to raw.githubusercontent.com CDN.
    v1.1.0: Fixed TZ env type (int → string), reduced livenessProbe initialDelay from 30min to 5min, added resource limits to initContainer, cleaned up Dockerfile dependencies.
    v1.0.4: Added openMethod: window to entrance config so dashboard opens in browser tab on click.
    v1.0.2: Fixed Envoy upstream timeout. Replaced broken initContainer with kubectl-based ConfigMap patching (15s → 3600s). Added RBAC for ConfigMap access.
    v1.0.1: Removed init-patcher relict, hostPath /dev/dri instead of GPU device plugin.
  fullDescription: |
    Qwen3-Embedding-4B + OpenVINO on CPU, optimized for Olares One.

    **Model**
    Qwen/Qwen3-Embedding-4B — a 4-billion-parameter embedding model from Qwen, INT8 quantized via Optimum Intel for efficient inference on consumer hardware.

    **Inference Engine**
    OpenVINO 2026.0.0+ with Hugging Face Transformers 4.55.4. Runs on Intel Core Ultra iGPU (Arrow Lake-S) with automatic CPU fallback if the GPU is unavailable.

    **Key Features**
    - OpenAI-compatible API endpoints: /v1/embeddings, /v1/models, /health
    - THROUGHPUT mode with 2 parallel streams, FP16 precision, and large memory allocations for high throughput
    - Async endpoints with race-condition protection for concurrent RAG workloads
    - Automatic model download and OpenVINO conversion on first start
    - Cluster mode (2 pods across nodes) or single-node mode selectable at install time
    - Built-in HTML dashboard on root endpoint (/)

    **Resource Usage**
    Single mode: ~24 GB RAM, 2 CPU cores
    Cluster mode: ~48 GB RAM, 4 CPU cores (2 nodes)
    Disk: 50 GB for model cache

  developer: Aimighty
  website: https://github.com/bayerhazard/aimighty-embedder
  sourceCode: https://github.com/bayerhazard/aimighty-embedder
  locale:
    - en-US
  supportArch:
    - amd64
  limitedCpu: 4
  requiredCpu: 2
  requiredMemory: 24Gi
  limitedMemory: 24Gi
  requiredDisk: 50Gi
permission:
  appData: true
options:
  apiTimeout: 3600
  dependencies:
    - name: olares
      version: '>=1.12.2-0'
      type: system
  allowMultipleInstall: false
envs:
  - envName: EMBEDDER_MODE
    required: false
    default: "cluster"
    type: string
    editable: true
    applyOnChange: true
    description: "Deployment mode: 'cluster' = 2 pods across nodes (~48GB RAM), 'single' = 1 pod (~24GB RAM)"
    options:
      - title: Cluster mode (2 pods, ~48GB RAM)
        value: "cluster"
      - title: Single node (1 pod, ~24GB RAM)
        value: "single"
  - envName: OV_DEVICE
    required: false
    default: "CPU"
    type: string
    editable: true
    applyOnChange: true
    description: "OpenVINO inference device"
    options:
      - title: CPU (recommended)
        value: "CPU"
      - title: GPU (requires compatible driver)
        value: "GPU"
  - envName: PERFORMANCE_HINT
    required: false
    default: "THROUGHPUT"
    type: string
    editable: true
    applyOnChange: true
    description: "OpenVINO performance optimization mode"
    options:
      - title: THROUGHPUT (maximize requests/sec)
        value: "THROUGHPUT"
      - title: LATENCY (minimize response time)
        value: "LATENCY"
  - envName: NUM_STREAMS
    required: false
    default: "2"
    type: int
    editable: true
    applyOnChange: true
    description: "Number of parallel inference streams (optimal for CPU: 2)"
  - envName: HF_MODEL_ID
    required: false
    default: "Qwen/Qwen3-Embedding-4B"
    type: string
    editable: true
    applyOnChange: true
    description: "HuggingFace model ID for the embedding model"
  - envName: MODEL_NAME
    required: false
    default: "aimighty-embedding-4b"
    type: string
    editable: true
    applyOnChange: true
    description: "Model name exposed in the OpenAI-compatible API"
  - envName: PORT
    required: false
    default: "9997"
    type: int
    editable: true
    applyOnChange: true
    description: "HTTP port for the embedding API"
  - envName: MODEL_CACHE_DIR
    required: false
    default: "/models_cache"
    type: string
    editable: true
    applyOnChange: true
    description: "Directory for cached model files"
  - envName: OV_CACHE_DIR
    required: false
    default: "/tmp/ov_cache"
    type: string
    editable: true
    applyOnChange: true
    description: "Directory for OpenVINO runtime cache"
  - envName: TZ
    required: false
    default: "Etc/UTC"
    type: string
    editable: true
    applyOnChange: true
    description: "Timezone for pod logs"
