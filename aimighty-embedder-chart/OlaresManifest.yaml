olaresManifest.version: '0.10.0'
olaresManifest.type: app
metadata:
  name: aimighty-embedder
  title: Aimighty Embedder
  description: OpenAI-compatible embedding API powered by OpenVINO on Intel Core Ultra 7 275HX iGPU (Qwen3-Embedding-4B INT8)
  icon: https://github.com/bayerhazard/aimighty-embedder/raw/main/icon.png
  version: 0.1.3
  categories:
    - AI
    - Developer Tools
entrances:
  - name: aimighty-embedder
    port: 9997
    title: Aimighty Embedder
    host: aimighty-embedder
    authLevel: public
    invisible: false
permission:
  appCache: true
  appData: true
provider:
  - name: aimighty-embedder-api
    entrance: aimighty-embedder
    paths:
      - "/v1/*"
      - "/health"
    verbs:
      - "*"
spec:
  versionName: '0.1.3'
  fullDescription: |
    Aimighty Embedder is an OpenAI-compatible embedding service powered by OpenVINO on Intel Core Ultra 7 275HX iGPU.
    
    Model: Qwen/Qwen3-Embedding-4B (INT8 quantized via Optimum Intel 2.1.0.dev0 + OpenVINO 2026.0.0+)
    Transformer Version: 4.57.6
    
    Features:
    - OpenAI-compatible API (/v1/embeddings, /v1/models)
    - OpenVINO INT8 quantized Qwen3-Embedding-4B model
    - Intel iGPU optimization: THROUGHPUT hint, 2 streams, FP16, Large Allocations
    - Async endpoints with lock against race conditions
    - Automatic CPU fallback on iGPU failure
    - Automatic model download and conversion on first start
    
    Hardware Requirements:
    - Intel Core Ultra 7 275HX (Arrow Lake-S) with OpenCL support
    - Intel GPU Device Plugin installed (gpu.intel.com/i915)
    - SR-IOV disabled on host for Level Zero compatibility
    - Minimum 16 GB RAM, 24 GB recommended
    
    Driver Note:
    - Intel GPU drivers pinned to OpenCL 24.39.x (avoids IGC 25.18.x crash on Arrow Lake)
    
    Olares Sidecar Note:
    - apiTimeout: 3600 sets per-route HTTP timeout (override for default 15s)
    - For long batch embeddings (e.g. RAGFlow with 100+ chunks), the cluster
      idle_timeout (hardcoded to 10s in Olares) must be patched separately via
      the sidecar patcher script in scripts/install-sidecar-patcher.sh
  upgradeDescription: |
    v0.1.3: Intel Core Ultra 7 275HX support, custom icon, worker node deployment.
    v0.1.2: apiTimeout=3600 to fix RAGFlow embedding timeouts on large batches.
    v0.1.1: GPU configuration with Intel Device Plugin, Arrow Lake-S support, IGC driver pinning.
    v0.1.0: Initial release of Aimighty Embedder for Olares.
  developer: Aimighty
  locale:
    - en
  supportArch:
    - amd64
  requiredCpu: 2
  requiredMemory: 8Gi
  limitedCpu: 4
  limitedMemory: 24Gi
  requiredGpu: 1
  apiTimeout: 3600
options:
  dependencies:
    - name: olares
      type: system
      version: '>=1.12.2-0'
  allowMultipleInstall: false
envs:
  - envName: HF_MODEL_ID
    required: false
    default: "Qwen/Qwen3-Embedding-4B"
    type: string
    editable: true
    description: "HuggingFace model ID to download and convert"
  - envName: HUGGING_FACE_HUB_TOKEN
    required: false
    type: password
    editable: true
    description: "HuggingFace token (optional, for gated models)"
  - envName: OV_DEVICE
    required: false
    default: "GPU"
    type: string
    editable: true
    description: "OpenVINO device (GPU or CPU)"
  - envName: PERFORMANCE_HINT
    required: false
    default: "THROUGHPUT"
    type: string
    editable: true
    description: "OpenVINO performance hint (THROUGHPUT or LATENCY)"
  - envName: NUM_STREAMS
    required: false
    default: "2"
    type: int
    editable: true
    description: "Number of parallel OpenVINO execution streams"
  - envName: GPU_ENABLE_LARGE_ALLOCATIONS
    required: false
    default: "YES"
    type: string
    editable: true
    description: "Enable large allocations for unified memory (YES/NO)"
  - envName: INFERENCE_PRECISION_HINT
    required: false
    default: "f16"
    type: string
    editable: true
    description: "Inference precision hint (f16, f32, bf16)"